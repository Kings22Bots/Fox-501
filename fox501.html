<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dash player</title>
   
  <!-- Shaka Player Latest -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.8/shaka-player.ui.min.js" crossorigin="anonymous"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.8/controls.min.css" crossorigin="anonymous">
header("Access-Control-Allow-Origin: *");
header("Access-Control-Allow-Methods: GET, OPTIONS");
header("Access-Control-Allow-Headers: *");

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .shaka-video-container {
      position: absolute;
      inset: 0;
    }
    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="shaka-video-container">
    <video autoplay playsinline preload="metadata"
      poster="https://webiptv.site/weiptv.webp"></video>
  </div>

<script>
document.addEventListener('DOMContentLoaded', async () => {

  /* =============================
     Polyfill
  ============================== */
  shaka.polyfill.installAll();

  /* =============================
     Read URL Params (COMBINED FIX)
  ============================== */
  const params = new URLSearchParams(window.location.search);
  let mpdUrl = params.get('url');
  let keysParam = params.get('keys');

  if (!mpdUrl) {
    alert('Missing url parameter');
    return;
  }

  /* =============================
     Parse ClearKeys (BOTH SUPPORT)
  ============================== */
  const clearKeys = {};

  //Case 1: keys passed separately
  if (keysParam) {
    keysParam.split(',').forEach(pair => {
      const [kid, key] = pair.split(':');
      if (kid && key) {
        clearKeys[kid.trim()] = key.trim();
      }
    });
  }

  //Case 2: keys inside MPD URL
  const keyMatch = mpdUrl.match(/[?&]keys=([^&]+)/);

  if (keyMatch) {
    const decoded = decodeURIComponent(keyMatch[1]);

    decoded.split(',').forEach(pair => {
      const [kid, key] = pair.split(':');
      if (kid && key) {
        clearKeys[kid.trim()] = key.trim();
      }
    });

    // remove keys from MPD before loading
    mpdUrl = mpdUrl.replace(/[?&]keys=[^&]+/, '');
  }

  console.log('Final MPD:', mpdUrl);
  console.log('Loaded ClearKeys:', clearKeys);

  /* =============================
     Init Shaka
  ============================== */
  if (!shaka.Player.isBrowserSupported()) {
    alert('Browser not supported');
    return;
  }

  const video = document.querySelector('video');
  const player = new shaka.Player(video);

  const container = document.querySelector('.shaka-video-container');
  const ui = new shaka.ui.Overlay(player, container, video);
  
  ui.configure({    
    controlPanelElements: [  
      "play_pause", "time_and_duration", "mute", "volume",  
      "spacer", "captions", "quality", "language",  
      "picture_in_picture", "fullscreen"
    ],  
    volumeBarColors: { 
      base: 'rgba(63, 187, 1, 1)', 
      level: 'rgb(255, 69, 0)' 
    },  
    seekBarColors: { 
      base: 'rgb(41, 41, 163)', 
      buffered: 'rgb(35, 99, 3)', 
      played: 'rgba(63, 187, 1, 1)' 
    }  
  });  

  /* =============================
     DRM Config
  ============================== */
  player.configure({
    drm: {
      clearKeys: clearKeys
    },

    streaming: {
      lowLatencyMode: true,
      bufferingGoal: 10,
      rebufferingGoal: 2,
      bufferBehind: 10,
      retryParameters: {
        timeout: 8000,
        maxAttempts: 4,
        baseDelay: 200,
        backoffFactor: 1.1
      },
      segmentRequestTimeout: 8000,
      segmentPrefetchLimit: 3
    },

    manifest: {
      retryParameters: {
        timeout: 8000,
        maxAttempts: 3
      }
    }
  });

  /* =============================
     Autoplay Handler
  ============================== */
  const tryPlay = async () => {
    try {
      video.muted = false;
      await video.play();
    } catch {
      video.muted = true;
      await video.play();
    }
  };

  /* =============================
     Load Stream
  ============================== */
  try {
    await player.load(mpdUrl);
    tryPlay();
    console.log('Stream Loaded');
  } catch (e) {
    console.error('Load Error:', e);
  }

});
</script>

<!-- Anti-debugging -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>
<script>
DisableDevtool({
  disable: true,
  disableMenu: true,
  clearLog: true,
  disableSelect: true,
  disableCopy: true,
  disableCut: true,
  disablePaste: true,
  interval: 10,
  disableMobile: true,
  ondevtoolopen: function () {
    window.location.href = "about:blank";
  },
});
</script>

<script>(function(s){s.dataset.zone='10674197',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

</body>
</html>
